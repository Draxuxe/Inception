server {

	listen 443 ssl;
	listen [::]:443 ssl;
	
	server_name lfilloux.42.fr;
	
	ssl_certificate /etc/nginx/ssl/lfilloux.pem;
	ssl_certificate_key /etc/nginx/ssl/lfilloux.key;
	ssl_protocols TLSv1.3;

	root /var/www/html;

	index index.php index.html index.htm;

	location / {
		autoindex on;
		try_files $uri $uri/ =404;
	}
}
