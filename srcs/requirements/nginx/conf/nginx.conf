server {
        listen 443;
        listen [::]:443;
        server_name lfilloux.42.fr www.lfilloux.42.fr;
  		root   /var/www/lfilloux.42.fr/public_html;

  access_log /www/lfilloux.42.fr/logs/access.log;
  error_log /www/lfilloux.42.fr/logs/error.log;

  location = /favicon.ico {
  log_not_found off;
  access_log off;
  }

  location = /robots.txt {
    allow all;
    log_not_found off;
    access_log off;
  }

  location / {
    index  index.html index.htm index.php;
    try_files $uri $uri/ /index.php;
  }

  location ~ \.php$ {
    include /etc/nginx/fastcgi_params;
    if ($uri !~ "^/images/") {
      fastcgi_pass unix:/var/run/php-fastcgi/php-fastcgi.socket;
    }
    fastcgi_index index.php;
    fastcgi_param  SCRIPT_FILENAME  /var/www/lfilloux.42.fr/public_html$fastcgi_script_name;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
    expires max;
    log_not_found off;
  }
}