server {
		listen 443 ssl;
		listen [::]:443 ssl;
		server_name lfilloux.42.fr;

		root /var/www/wordpress/;

		index index.html;
		ssl_protocols TLSv1.2;
		ssl_certificate /etc/ssl/certs/lfilloux.crt;
		ssl_certificate_key /etc/ssl/private/lfilloux.key;

		location / {
			try_files $uri $uri/ =404;
		}

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        }
}