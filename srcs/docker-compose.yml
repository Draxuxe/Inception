version: '3.3'

services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    ports:
      - 3306:3306
    env_file:
      - ./.env
    restart: always
    networks:
      - inception
    volumes:
      - "mdb_vol:/var/lib/mysql"
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    ports: 
      - 443:443
    restart: always
    networks:
      - inception
    volumes:
      - wp_vol:/var/www/html
  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    ports:
      - 9000:9000
    restart: always
    env_file:
      - ./.env
    volumes:
      - wp_vol:/var/www/html

networks:
  inception:
    driver: bridge

volumes:
  mdb_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/mariadb
  wp_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/wordpress