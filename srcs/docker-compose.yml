version: '3'

services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    ports:
      - 3306:3306
    restart: always
    networks:
      - inception
    env_file:
      - ./.env
    volumes:
      - mdb_vol:/var/lib/mysql
#  wordpress:
#    build: ./requirements/wordpress
#    image: wordpress
#    container_name: wordpress
#    ports:
#      - 9000:9000
#    restart: always
#    depends_on:
#      - mariadb
#    environment:
#      - ./.env
#    volumes:
#      - wp_vol:/var/www/html
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    ports: 
      - 443:443
    restart: always
#    depends_on:
#      - wordpress
    networks:
      - inception
    volumes:
      - wp_vol:/var/www/html

networks:
  inception:
    driver: bridge

volumes:
  mdb_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/mariadb
  wp_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/wordpress