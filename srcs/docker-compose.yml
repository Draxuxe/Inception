version: '3.3'

services:
  mariadb:
    image: mariadb
    container_name: mariadb
    build: ./requirements/mariadb
    ports:
      - 3306:3306
    restart: unless-stopped
    networks:
      - inception
    env_file: .env
    volumes:
      - mdb_vol:/var/lib/mysql

  wordpress:
    image: wordpress
    container_name: wordpress
    build: ./requirements/wordpress
    ports:
      - 9000:9000
    restart: unless-stopped
    depends_on:
      - mariadb
    networks:
      - inception
    env_file: .env
    volumes:
      - wp_vol:/var/www/

  nginx:
    image: nginx
    container_name: nginx
    build: ./requirements/nginx
    ports: 
      - 443:443
    restart: unless-stopped
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      - wp_vol:/var/www/

networks:
  inception:
    driver: bridge

volumes:
  mdb_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/mariadb
  wp_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/wordpress