version: '3'

services:
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    ports: 
      - 443:443
    restart: on-failure
    networks:
      - inception
    env_file:
      - ./.env
    depends_on:
      - wordpress
    volumes: 
      - wp_vol:/var/www/
  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    ports:
      - 9000
    restart: unless-stopped
    networks:
      - inception
    env_file:
      - ./.env
    volumes: 
      - wp_vol:/var/www
    depends_on:
      - mariadb
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    ports:
      - 3306
    restart: unless-stopped
    networks:
      - inception
    env_file:
      - ./.env
    volumes:
      - db_vol:/var/lib/mysql

networks:
  inception:
    driver: bridge

volumes:
  wp_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/wordpress
  db_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/mariadb