version: '3.8'

services:
   nginx:
    build: 
      - ./requirements/nginx
    image:
      nginx
    container_name:
      nginx
    ports: 
      - "443:443"
    restart:
      always
    networks:
      - inception
    environnement:
      - ./env
    depends_on:
      wordpress
    volumes:
      wp_volume:/var/www/

networks:
  inception:
    driver: bridge

volumes:
  wp_vol:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/lfilloux/data/wp'