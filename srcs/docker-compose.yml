version: '3'

services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PWD:   ${MYSQL_ROOT_PWD}
      WP_DATABASE_NAME: ${MYSQL_DB}
      WP_DATABASE_USR:  ${MYSQL_USR}
      WP_DATABASE_PWD:  ${MYSQL_USR_PWD}
    restart: always
    networks:
      - inception
    volumes:
      - "mdb_vol:/var/lib/mysql"
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    ports: 
      - 443:443
    restart: always
    networks:
      - inception
    volumes:
      - wp_vol:/var/www/html
  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    ports:
      - 9000:9000
    restart: always
    environment:
      MYSQL_HOST:       ${MYSQL_HOST}
      WP_DATABASE_NAME: ${MYSQL_DB}
      WP_DATABASE_USR:  ${MYSQL_USR}
      WP_DATABASE_PWD:  ${MYSQL_USR_PWD}
      DOMAIN_NAME:      ${DOMAIN_NAME}
      WP_TITLE:         ${TITLE}
      WP_ADMIN_USR:     ${MYSQL_ROOT_USR}
      WP_ADMIN_PWD:     ${MYSQL_ROOT_PWD}
      WP_ADMIN_EMAIL:   ${ROOT_EMAIL}
      WP_USR:           ${MYSQL_USR}
      WP_PWD:           ${MYSQL_USR_PWD}
      WP_EMAIL:         ${USR_EMAIL}
    volumes:
      - wp_vol:/var/www/html

networks:
  inception:
    driver: bridge

volumes:
  mdb_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/mariadb
  wp_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lfilloux/data/wordpress