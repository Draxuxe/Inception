version: "3.7"


services:
  mariadb:
    image: mariadb
    container_name: mariadb
    build: ./requierements/mariadb
    volumes:
      - database_vol:/var/lib/mysql
    env_file:
      - .env
    networks:
      - inception
    ports:
      - 3306:3306
    restart: always

  wordpress:
    container_name: wordpress
    build: ./requierements/wordpress
    image: wordpress
    depends_on:
      - mariadb
    ports:
      - "9000:9000"
    env_file:
      - .env
    networks:
      - inception
    volumes:
      - wordpress_vol:/var/www/
    restart: always

  nginx:
    container_name: nginx
    image: nginx
    restart: always
    build: requierements/nginx
    volumes:
      - wordpress_vol:/var/www/
    depends_on:
      - wordpress
    env_file:
      - .env
    ports:
      - "443:443"
    networks:
      - inception

networks:
  inception:
    driver: bridge

volumes:
  wordpress_vol:
    driver: local
    driver_opts:
      type: none
      device: /home/lfilloux/data/wordpress
      o: bind
  database_vol:
    driver: local
    driver_opts:
      type: none
      device: /home/lfilloux/data/database
      o: bind